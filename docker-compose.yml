version: '3.8'

services:
  web:
    build: .
    container_name: news_sentiment_web
    command: gunicorn --bind 0.0.0.0:8000 news_sentiment_analysis.wsgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=news_sentiment
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: news_sentiment_db
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=news_sentiment
      - MYSQL_CHARSET=utf8mb4
    ports:
      - "3306:3306"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: news_sentiment_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
  static_volume:
  media_volume: